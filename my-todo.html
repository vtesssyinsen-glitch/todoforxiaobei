<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 尹蕴珩的魔法任务表 ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffb3d1 0%, #ffd6e8 30%, #ffe8f5 60%, #ffc8e8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* ===== FLOATING STARS ===== */
  .star { position: fixed; pointer-events: none; font-size: 18px; animation: floatStar linear infinite; opacity: 0.6; }
  @keyframes floatStar {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 10px;
    position: relative;
  }
  .header h1 {
    font-size: 2.4rem;
    font-weight: 900;
    color: #d63384;
    text-shadow: 3px 3px 0 #ffb3d1, 0 0 20px rgba(214,51,132,0.3);
    letter-spacing: 2px;
  }
  .header p {
    color: #e75480;
    font-size: 1rem;
    margin-top: 4px;
    font-weight: 700;
  }

  /* ===== RUBIK'S CUBE ===== */
  .cube-wrapper {
    perspective: 300px;
    width: 90px;
    height: 90px;
    margin: 15px auto;
    cursor: pointer;
  }
  .cube {
    width: 90px;
    height: 90px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 6s infinite linear;
  }
  @keyframes rotateCube {
    0%   { transform: rotateX(0deg)   rotateY(0deg); }
    25%  { transform: rotateX(20deg)  rotateY(90deg); }
    50%  { transform: rotateX(0deg)   rotateY(180deg); }
    75%  { transform: rotateX(-20deg) rotateY(270deg); }
    100% { transform: rotateX(0deg)   rotateY(360deg); }
  }
  .face {
    position: absolute;
    width: 90px;
    height: 90px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
    border-radius: 6px;
  }
  .face .cell {
    border-radius: 4px;
    border: 2px solid rgba(0,0,0,0.15);
    box-shadow: inset 0 1px 3px rgba(255,255,255,0.5);
  }
  .front  { transform: translateZ(45px); background: rgba(255,255,255,0.1); }
  .back   { transform: rotateY(180deg) translateZ(45px); background: rgba(255,255,255,0.1); }
  .left   { transform: rotateY(-90deg) translateZ(45px); background: rgba(255,255,255,0.1); }
  .right  { transform: rotateY(90deg)  translateZ(45px); background: rgba(255,255,255,0.1); }
  .top    { transform: rotateX(90deg)  translateZ(45px); background: rgba(255,255,255,0.1); }
  .bottom { transform: rotateX(-90deg) translateZ(45px); background: rgba(255,255,255,0.1); }

  .front .cell  { background: #ff6b6b; }
  .back .cell   { background: #ffa500; }
  .left .cell   { background: #4ecdc4; }
  .right .cell  { background: #45b7d1; }
  .top .cell    { background: #f7dc6f; }
  .bottom .cell { background: #98fb98; }

  /* Scrambled look */
  .front .cell:nth-child(3)  { background: #ffa500; }
  .front .cell:nth-child(5)  { background: #f7dc6f; }
  .front .cell:nth-child(7)  { background: #4ecdc4; }
  .top .cell:nth-child(2)    { background: #ff6b6b; }
  .top .cell:nth-child(6)    { background: #45b7d1; }
  .right .cell:nth-child(4)  { background: #98fb98; }
  .right .cell:nth-child(8)  { background: #f7dc6f; }

  /* ===== DATE BAR ===== */
  .date-bar {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 8px 24px;
    color: #d63384;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(214,51,132,0.15);
    border: 2px solid rgba(255,182,213,0.6);
  }

  /* ===== MAIN CARD ===== */
  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 12px 40px rgba(214,51,132,0.18), 0 4px 12px rgba(0,0,0,0.06);
    border: 2px solid rgba(255,182,213,0.5);
  }

  /* ===== ADD TASK ===== */
  .add-section {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .icon-select {
    font-size: 1.4rem;
    border: 2px solid #ffb3d1;
    border-radius: 14px;
    padding: 8px 6px;
    background: white;
    cursor: pointer;
    outline: none;
    color: #333;
    flex-shrink: 0;
  }
  .task-input {
    flex: 1;
    border: 2px solid #ffb3d1;
    border-radius: 14px;
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    color: #555;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }
  .task-input:focus { border-color: #d63384; box-shadow: 0 0 0 3px rgba(214,51,132,0.12); }
  .task-input::placeholder { color: #ffaac9; }
  .add-btn {
    background: linear-gradient(135deg, #d63384, #e75480);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px 18px;
    font-size: 1.3rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(214,51,132,0.35);
    flex-shrink: 0;
  }
  .add-btn:hover { transform: scale(1.1); box-shadow: 0 6px 16px rgba(214,51,132,0.45); }
  .add-btn:active { transform: scale(0.95); }

  /* ===== TASK LIST ===== */
  .section-title {
    font-size: 0.85rem;
    font-weight: 900;
    color: #e75480;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border-radius: 18px;
    padding: 12px 14px;
    border: 2px solid #ffe0ef;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .task-item:hover { border-color: #ffb3d1; box-shadow: 0 4px 14px rgba(214,51,132,0.12); }
  .task-item.done { background: #fff0f7; border-color: #ffc2de; }
  .task-item.done .task-label { text-decoration: line-through; color: #ccc; }

  .task-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }

  .task-label {
    flex: 1;
    font-size: 1rem;
    font-weight: 700;
    color: #555;
    transition: color 0.3s;
    word-break: break-word;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 900;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .badge-todo { background: #ffe8f5; color: #d63384; }
  .badge-done { background: #d4f8e8; color: #0a9e60; }

  .done-btn {
    background: linear-gradient(135deg, #ffb3d1, #d63384);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 7px 13px;
    font-size: 0.8rem;
    font-weight: 900;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 8px rgba(214,51,132,0.3);
  }
  .done-btn:hover { transform: scale(1.08); }
  .done-btn:active { transform: scale(0.93); }
  .task-item.done .done-btn { background: linear-gradient(135deg, #98fb98, #32cd32); box-shadow: 0 3px 8px rgba(50,205,50,0.3); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    opacity: 0.3;
    transition: opacity 0.2s;
    flex-shrink: 0;
    padding: 2px;
  }
  .delete-btn:hover { opacity: 0.8; }

  /* ===== PROGRESS ===== */
  .progress-wrap { margin-top: 22px; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-text { font-size: 0.85rem; font-weight: 700; color: #e75480; }
  .progress-count { font-size: 0.85rem; font-weight: 900; color: #d63384; }
  .progress-bar-bg {
    background: #ffe0ef;
    border-radius: 99px;
    height: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #ff9ec4, #d63384);
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .progress-bar-fill::after {
    content: '⭐';
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    filter: drop-shadow(0 0 4px gold);
  }

  /* ===== WAND EFFECT ===== */
  .wand-particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    animation: wandPop 0.9s ease-out forwards;
    z-index: 9999;
  }
  @keyframes wandPop {
    0%   { transform: translate(0,0) scale(0.3) rotate(0deg); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
  }

  .flash-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.5);
    pointer-events: none;
    z-index: 9998;
    animation: flashFade 0.4s ease-out forwards;
  }
  @keyframes flashFade { from { opacity: 1; } to { opacity: 0; } }

  /* ===== ALL DONE BANNER ===== */
  .congrats {
    text-align: center;
    margin-top: 18px;
    padding: 14px;
    background: linear-gradient(135deg, #fff0f7, #ffe8f5);
    border-radius: 18px;
    border: 2px dashed #ffb3d1;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .congrats.show { display: block; }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .congrats p { font-size: 1.1rem; font-weight: 900; color: #d63384; }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 20px 0; color: #ffaac9; font-weight: 700; font-size: 0.95rem; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 400px) {
    .header h1 { font-size: 1.8rem; }
    .card { padding: 18px; }
    .task-label { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<!-- Floating stars -->
<div id="stars-container"></div>

<div class="header">
  <h1>✨ 尹蕴珩的魔法任务表 ✨</h1>
  <p>完成任务，魔杖来助力！🪄</p>
</div>

<!-- Rubik's Cube -->
<div class="cube-wrapper" title="点我！">
  <div class="cube" id="rubikCube">
    <div class="face front"> <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
    <div class="face back">  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
    <div class="face left">  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
    <div class="face right"> <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
    <div class="face top">   <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
    <div class="face bottom"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div> </div>
  </div>
</div>

<div class="date-bar" id="dateBar">📅 加载中...</div>

<div class="card">

  <!-- Add Task -->
  <div class="add-section">
    <select class="icon-select" id="iconSelect">
      <option value="🐟">🐟 小鱼</option>
      <option value="🦜">🦜 鹦鹉</option>
      <option value="🐢">🐢 乌龟</option>
      <option value="🦆">🦆 鸭子</option>
      <option value="🐣">🐣 小鸡</option>
    </select>
    <input class="task-input" id="taskInput" type="text" placeholder="写下今天的任务～" maxlength="40">
    <button class="add-btn" onclick="addTask()" title="添加任务">＋</button>
  </div>

  <!-- Task List -->
  <div class="section-title">📋 今日 Top 5 任务</div>
  <ul class="task-list" id="taskList"></ul>

  <div class="empty" id="emptyMsg">还没有任务，快来添加吧 🌸</div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-text">🎀 完成进度</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Congrats -->
  <div class="congrats" id="congrats">
    <p>🎉 哇！所有任务都完成啦！你真棒！🌟</p>
    <p style="font-size:1.5rem; margin-top:6px;">🏆✨🎊🦄🎀</p>
  </div>

</div>

<script>
  // ===== STATE =====
  const ICONS = ['🐟','🦜','🐢','🦆','🐣'];
  const WAND_EMOJIS = ['✨','⭐','🌟','💖','🌸','🎀','💫','🎉','🪄','💕'];
  let tasks = JSON.parse(localStorage.getItem('magicTasks') || '[]');


  function save() {
    localStorage.setItem('magicTasks', JSON.stringify(tasks));
  }

  // ===== DATE =====
  const dateBar = document.getElementById('dateBar');
  const now = new Date();
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  dateBar.textContent = `📅 ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日  ${weekdays[now.getDay()]}`;

  // ===== RENDER =====
  function render() {
    const list = document.getElementById('taskList');
    const emptyMsg = document.getElementById('emptyMsg');
    list.innerHTML = '';

    if (tasks.length === 0) {
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');
        li.dataset.id = task.id;
        li.innerHTML = `
          <span class="task-icon">${task.icon}</span>
          <span class="task-label">${escHtml(task.label)}</span>
          <span class="badge ${task.done ? 'badge-done' : 'badge-todo'}">${task.done ? '✅ 完成' : '⏳ 待做'}</span>
          <button class="done-btn" onclick="toggleDone(${task.id}, event)">${task.done ? '👍 已完成' : '🪄 完成！'}</button>
          <button class="delete-btn" onclick="deleteTask(${task.id})" title="删除">🗑</button>
        `;
        list.appendChild(li);
      });
    }

    updateProgress();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ===== PROGRESS =====
  function updateProgress() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('progressCount').textContent = `${done} / ${total}`;
    const pct = total === 0 ? 0 : Math.round(done / total * 100);
    document.getElementById('progressFill').style.width = pct + '%';

    const congrats = document.getElementById('congrats');
    if (total > 0 && done === total) {
      congrats.classList.add('show');
    } else {
      congrats.classList.remove('show');
    }
  }

  // ===== ADD =====
  function addTask() {
    const input = document.getElementById('taskInput');
    const label = input.value.trim();
    if (!label) { input.focus(); return; }
    if (tasks.length >= 5) {
      alert('今天最多5个任务哦！完成一个再加～ 🌸');
      return;
    }
    const icon = document.getElementById('iconSelect').value;
    tasks.push({ id: Date.now(), icon, label, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ===== TOGGLE DONE =====
  function toggleDone(id, event) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    save();
    render();
    if (task.done) {
      spawnWandEffect(event.clientX, event.clientY);
    }
  }

  // ===== DELETE =====
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // ===== WAND EFFECT =====
  function spawnWandEffect(x, y) {
    // Flash
    const flash = document.createElement('div');
    flash.className = 'flash-overlay';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 400);

    // Particles
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      p.className = 'wand-particle';
      const emoji = WAND_EMOJIS[Math.floor(Math.random() * WAND_EMOJIS.length)];
      p.textContent = emoji;
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist = 60 + Math.random() * 100;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 60;
      const rot = (Math.random() - 0.5) * 360;
      p.style.cssText = `left:${x}px; top:${y}px; --tx:${tx}px; --ty:${ty}px; --rot:${rot}deg;
        animation-delay:${Math.random() * 0.15}s; animation-duration:${0.7 + Math.random()*0.4}s;`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  // ===== FLOATING STARS =====
  const STAR_EMOJIS = ['⭐','🌟','✨','💖','🌸','🎀','💕','🦋','🌺','🍬'];
  function createStar() {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = STAR_EMOJIS[Math.floor(Math.random() * STAR_EMOJIS.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (12 + Math.random() * 14) + 'px';
    const dur = 8 + Math.random() * 12;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = -Math.random() * dur + 's';
    document.getElementById('stars-container').appendChild(el);
  }
  for (let i = 0; i < 18; i++) createStar();

  // ===== CUBE CLICK =====
  document.getElementById('rubikCube').addEventListener('click', function() {
    const dirs = ['rotateX(90deg)', 'rotateX(-90deg)', 'rotateY(90deg)', 'rotateY(-90deg)'];
    const d = dirs[Math.floor(Math.random() * dirs.length)];
    this.style.animation = 'none';
    this.style.transform = d + ' scale(1.15)';
    setTimeout(() => { this.style.transform = ''; this.style.animation = 'rotateCube 6s infinite linear'; }, 600);
  });

  // ===== INIT =====
  render();
</script>
</body>
</html>
